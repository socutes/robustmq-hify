apiVersion: v1
kind: Secret
metadata:
  name: hify-backend-secret
  namespace: hify
type: Opaque
# stringData 写明文，kubectl apply 时 K8s 自动 base64 编码存储
# 生产环境：不要把真实值提交到 git，通过 CI/CD 变量注入后 apply
#
# CI/CD 注入示例（推荐）：
#   kubectl create secret generic hify-backend-secret \
#     --from-literal=DB_PASSWORD=$DB_PASSWORD \
#     --from-literal=REDIS_PASSWORD=$REDIS_PASSWORD \
#     --from-literal=PGVECTOR_PASSWORD=$PGVECTOR_PASSWORD \
#     --from-literal=OPENAI_API_KEY=$OPENAI_API_KEY \
#     -n hify --dry-run=client -o yaml | kubectl apply -f -
stringData:
  DB_PASSWORD:       ""
  REDIS_PASSWORD:    ""
  PGVECTOR_PASSWORD: ""
  OPENAI_API_KEY:    ""
