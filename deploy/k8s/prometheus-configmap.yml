apiVersion: v1
kind: ConfigMap
metadata:
  name: prometheus-config
  namespace: hify
data:
  prometheus.yml: |
    global:
      scrape_interval:     15s
      evaluation_interval: 15s

    scrape_configs:
      - job_name: hify-backend
        metrics_path: /actuator/prometheus
        static_configs:
          - targets:
              - hify-backend:8081   # Actuator 独立端口，不走 Nginx
        relabel_configs:
          - target_label: application
            replacement: hify
